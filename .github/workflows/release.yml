name: Release

# Release pipeline for the Factuarea PHP SDK (design D6, task 5.2).
#
# Packagist versions a package by git tags, not by an uploaded artifact. So a
# release is simply an annotated `v*` tag:
#
#   1. This workflow builds and tests the tagged commit.
#   2. It publishes a GitHub Release with the matching CHANGELOG section.
#   3. Packagist updates the package automatically via the GitHub service hook
#      that is wired when the package is first submitted (see docs/RELEASING.md).
#
# There is no Packagist token in this workflow: the GitHub <-> Packagist auto
# update needs no secret here. If the auto-update hook is ever missing, the
# release still succeeds and docs/RELEASING.md explains the manual "Update"
# fallback on packagist.org.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-test:
    name: Build & test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        php: ["8.2", "8.3", "8.4"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc # v2.37.1
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          tools: composer:v2

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: PHPUnit
        run: ./vendor/bin/phpunit --colors=never

  guard-version:
    name: Tag matches gen.yaml version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      # The tag (v0.1.0) must match php.version in .speakeasy/gen.yaml (0.1.0).
      # This prevents publishing a tag whose code declares a different version.
      - name: Verify tag matches gen.yaml php.version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          GEN_VERSION="$(grep -E '^  version:' .speakeasy/gen.yaml | head -1 | awk '{print $2}' | tr -d '"')"
          echo "Tag version:     $TAG"
          echo "gen.yaml version: $GEN_VERSION"
          if [ "$TAG" != "$GEN_VERSION" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match php.version ($GEN_VERSION) in .speakeasy/gen.yaml. Bump gen.yaml before tagging."
            exit 1
          fi

  github-release:
    name: GitHub Release
    needs: [build-and-test, guard-version]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      # Pull the changelog section for this tag (everything under the
      # "## [x.y.z]" heading up to the next "## " heading).
      - name: Extract changelog section
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          NOTES="$(awk -v ver="$VERSION" '
            $0 ~ "^## \\[" ver "\\]" { capture=1; next }
            capture && /^## / { exit }
            capture { print }
          ' CHANGELOG.md)"
          if [ -z "$NOTES" ]; then
            NOTES="Release $GITHUB_REF_NAME. See CHANGELOG.md."
          fi
          {
            echo "notes<<__EOF__"
            echo "$NOTES"
            echo "__EOF__"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          name: ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.notes }}
          # 0.x releases are pre-GA; mark them as pre-releases until the API GA.
          prerelease: ${{ startsWith(github.ref_name, 'v0.') }}
          generate_release_notes: false

  packagist-reminder:
    name: Packagist auto-update note
    needs: [github-release]
    runs-on: ubuntu-latest
    steps:
      - name: Packagist update reminder
        run: |
          echo "Packagist updates factuarea/factuarea-php automatically from the"
          echo "GitHub service hook configured at first submit (docs/RELEASING.md)."
          echo "If the package page does not show this tag within a few minutes,"
          echo "the auto-update hook is not active: open"
          echo "  https://packagist.org/packages/factuarea/factuarea-php"
          echo "and click 'Update', or (re)connect the GitHub hook in the package settings."
